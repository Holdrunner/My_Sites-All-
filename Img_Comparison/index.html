<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Image Comparison</title>
    <style>
        /* =========================================
           CSS СТИЛИ
           ========================================= */
        
        :root {
            /* Цветовая палитра - Modern Dark */
            --bg-color: #0f172a;
            --surface-color: rgba(30, 41, 59, 0.7);
            --surface-border: rgba(255, 255, 255, 0.1);
            --primary-color: #3b82f6;
            --primary-hover: #60a5fa;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --danger-color: #ef4444;
            --slider-color: #ffffff;
            
            /* Размеры и тени */
            --radius-md: 8px;
            --radius-lg: 12px;
            --shadow-glass: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Верхняя панель управления (Glassmorphism) */
        header {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            background: var(--surface-color);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--surface-border);
            border-radius: var(--radius-lg);
            padding: 12px 24px;
            display: flex;
            gap: 20px;
            align-items: center;
            box-shadow: var(--shadow-glass);
            transition: opacity 0.3s ease;
        }

        /* Скрываем панель при активном взаимодействии для удобства */
        body.is-interacting header {
            opacity: 0.2;
            pointer-events: none;
        }

        .header-section {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .divider {
            width: 1px;
            height: 30px;
            background-color: var(--surface-border);
        }

        /* Кнопки и инпуты */
        button, .file-upload-btn {
            background: transparent;
            border: 1px solid var(--surface-border);
            color: var(--text-main);
            padding: 8px 16px;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
        }

        button:hover, .file-upload-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.2);
        }

        button.active {
            background: var(--primary-color);
            border-color: var(--primary-color);
            color: white;
        }

        button.active:hover {
            background: var(--primary-hover);
            border-color: var(--primary-hover);
        }

        input[type="file"] {
            display: none;
        }

        .file-upload-btn.loaded {
            border-color: #10b981;
            color: #10b981;
        }

        svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        #btn-mode svg {
            fill: none;
        }

        /* Рабочая область */
        main {
            flex: 1;
            position: relative;
            overflow: hidden;
            cursor: grab;
        }

        main:active {
            cursor: grabbing;
        }

        /* Обертка для зума и панорамирования */
        .workspace-wrapper {
            position: absolute;
            transform-origin: 0 0;
            will-change: transform;
            /* Выравнивание по центру */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Контейнер для изображений, принимает максимальный размер */
        .comparison-container {
            position: relative;
            background: repeating-conic-gradient(#1e293b 0% 25%, transparent 0% 50%) 50% / 20px 20px;
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
        }

        .layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: fill; /* Растягиваем до идеального контейнера */
            pointer-events: none; /* События обрабатывает контейнер */
        }

        #image-b {
            z-index: 2;
            /* clip-path задается через JS */
        }

        /* Слайдер / Линия разделения */
        .slider {
            position: absolute;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: none;
        }

        .slider.horizontal {
            top: 0;
            bottom: 0;
            width: 40px;
            transform: translateX(-50%);
            cursor: ew-resize;
        }

        .slider.vertical {
            left: 0;
            right: 0;
            height: 40px;
            transform: translateY(-50%);
            cursor: ns-resize;
        }

        /* Сама линия */
        .slider::before {
            content: '';
            position: absolute;
            background: var(--slider-color);
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        .slider.horizontal::before {
            width: 2px;
            height: 100%;
        }

        .slider.vertical::before {
            height: 2px;
            width: 100%;
        }

        /* Ползунок (Кружок) */
        .slider-handle {
            width: 36px;
            height: 36px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 2px solid var(--slider-color);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
            transition: transform 0.1s;
        }

        .slider:hover .slider-handle,
        .slider:active .slider-handle {
            transform: scale(1.1);
            background: rgba(255, 255, 255, 0.4);
        }

        .slider-handle svg {
            width: 20px;
            height: 20px;
            fill: var(--slider-color);
        }

        /* Заглушка, когда нет изображений */
        .empty-state {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: none;
        }

        .empty-state h2 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .empty-state p {
            color: var(--text-muted);
        }
        
        .hidden {
            display: none !important;
        }

        /* Адаптивность для мобильных */
        @media (max-width: 768px) {
            header {
                flex-direction: column;
                gap: 12px;
                padding: 12px;
                width: 90%;
                border-radius: var(--radius-md);
            }
            .divider {
                width: 100%;
                height: 1px;
            }
            .header-section {
                width: 100%;
                justify-content: space-between;
            }
            button, .file-upload-btn {
                flex: 1;
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <!-- ВЕРХНЯЯ ПАНЕЛЬ -->
    <header>
        <div class="header-section">
            <label class="file-upload-btn" id="btn-upload-a">
                <svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2h12c1.1 0 2-.9 2-2V8l-6-6zm2 14h-3v3h-2v-3H8v-2h3v-3h2v3h3v2zm-3-7V3.5L18.5 9H13z"/></svg>
                Image 1
                <input type="file" id="input-a" accept="image/*">
            </label>
            <label class="file-upload-btn" id="btn-upload-b">
                <svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2h12c1.1 0 2-.9 2-2V8l-6-6zm2 14h-3v3h-2v-3H8v-2h3v-3h2v3h3v2zm-3-7V3.5L18.5 9H13z"/></svg>
                Image 2
                <input type="file" id="input-b" accept="image/*">
            </label>
        </div>
        
        <div class="divider"></div>

        <div class="header-section">
            <button id="btn-mode" title="Toggle Split Direction">
                <svg id="icon-mode-h" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="12" y1="3" x2="12" y2="21"></line></svg>
                <svg id="icon-mode-v" class="hidden" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="12" x2="21" y2="12"></line></svg>
                <span id="text-mode">Vertical Split</span>
            </button>
            <button id="btn-reset" title="Reset scale and position">
                <svg viewBox="0 0 24 24"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg>
                Reset View
            </button>
        </div>
    </header>

    <!-- РАБОЧАЯ ОБЛАСТЬ -->
    <main id="main-workspace">
        <div class="empty-state" id="empty-state">
            <h2>Image Comparison Tool</h2>
            <p>Upload two images to get started.</p>
        </div>

        <div class="workspace-wrapper hidden" id="workspace-wrapper">
            <div class="comparison-container" id="comparison-container">
                <img id="image-a" class="layer" alt="Image A">
                <img id="image-b" class="layer" alt="Image B">
                
                <div class="slider horizontal" id="slider">
                    <div class="slider-handle" id="slider-handle">
                        <!-- Иконка внутри ползунка будет меняться JS -->
                        <svg id="handle-icon" viewBox="0 0 24 24"><path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6 1.41-1.41z"/></svg>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        /* =========================================
           JAVASCRIPT ЛОГИКА
           ========================================= */

        // Состояние приложения
        const state = {
            imgA: null,
            imgB: null,
            splitPos: 50, // В процентах (0-100)
            splitMode: 'horizontal', // 'horizontal' | 'vertical'
            
            // Трансформации вида
            scale: 1,
            translateX: 0,
            translateY: 0,
            
            // Флаги взаимодействия
            isDraggingSlider: false,
            isPanning: false,
            startX: 0,
            startY: 0,
            initTranslateX: 0,
            initTranslateY: 0
        };

        // DOM Элементы
        const els = {
            body: document.body,
            main: document.getElementById('main-workspace'),
            wrapper: document.getElementById('workspace-wrapper'),
            container: document.getElementById('comparison-container'),
            imgA: document.getElementById('image-a'),
            imgB: document.getElementById('image-b'),
            slider: document.getElementById('slider'),
            emptyState: document.getElementById('empty-state'),
            
            // Контролы
            inputA: document.getElementById('input-a'),
            inputB: document.getElementById('input-b'),
            btnA: document.getElementById('btn-upload-a'),
            btnB: document.getElementById('btn-upload-b'),
            btnMode: document.getElementById('btn-mode'),
            btnReset: document.getElementById('btn-reset'),
            
            // Иконки
            iconModeH: document.getElementById('icon-mode-h'),
            iconModeV: document.getElementById('icon-mode-v'),
            handleIcon: document.getElementById('handle-icon'),
            textMode: document.getElementById('text-mode')
        };

        // Иконки для ползунка
        const SVGS = {
            horizontal: '<path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6 1.41-1.41zM8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/>',
            vertical: '<path d="M16.59 8.59L12 13.17 7.41 8.59 6 10l6 6 6-6-1.41-1.41zM16.59 15.41L12 10.83l-4.59 4.58L6 14l6-6 6 6-1.41-1.41z"/>'
        };

        // =========================================
        // ИНИЦИАЛИЗАЦИЯ И ЗАГРУЗКА
        // =========================================

        function handleFileUpload(e, type) {
            const file = e.target.files[0];
            if (!file) return;

            const url = URL.createObjectURL(file);
            const imgElement = type === 'A' ? els.imgA : els.imgB;
            
            imgElement.onload = () => {
                if (type === 'A') {
                    state.imgA = { width: imgElement.naturalWidth, height: imgElement.naturalHeight };
                    els.btnA.classList.add('loaded');
                } else {
                    state.imgB = { width: imgElement.naturalWidth, height: imgElement.naturalHeight };
                    els.btnB.classList.add('loaded');
                }
                checkInitialization();
            };
            imgElement.src = url;
        }

        els.inputA.addEventListener('change', (e) => handleFileUpload(e, 'A'));
        els.inputB.addEventListener('change', (e) => handleFileUpload(e, 'B'));

        function checkInitialization() {
            if (state.imgA && state.imgB) {
                els.emptyState.classList.add('hidden');
                els.wrapper.classList.remove('hidden');
                calculateOptimalDimensions();
                updateSliderPosition();
            }
        }

        // КЛЮЧЕВАЯ ЛОГИКА: Автоматическое уравнивание разрешений
        function calculateOptimalDimensions() {
            // Находим максимальные размеры среди двух изображений
            const maxWidth = Math.max(state.imgA.width, state.imgB.width);
            const maxHeight = Math.max(state.imgA.height, state.imgB.height);

            // Устанавливаем контейнеру этот "идеальный" холст
            els.container.style.width = `${maxWidth}px`;
            els.container.style.height = `${maxHeight}px`;

            fitToScreen(maxWidth, maxHeight);
        }

        // =========================================
        // ПАНОРАМИРОВАНИЕ И ЗУМ (Infinite Canvas)
        // =========================================

        function fitToScreen(contentW, contentH) {
            const rect = els.main.getBoundingClientRect();
            // Вычисляем масштаб так, чтобы контейнер поместился с запасом (90% от экрана)
            const scaleX = (rect.width * 0.9) / contentW;
            const scaleY = (rect.height * 0.9) / contentH;
            
            state.scale = Math.min(scaleX, scaleY);
            
            // Центрируем
            state.translateX = (rect.width - (contentW * state.scale)) / 2;
            state.translateY = (rect.height - (contentH * state.scale)) / 2;
            
            applyTransform();
        }

        function applyTransform() {
            els.wrapper.style.transform = `translate(${state.translateX}px, ${state.translateY}px) scale(${state.scale})`;
        }

        els.btnReset.addEventListener('click', () => {
            if (state.imgA && state.imgB) calculateOptimalDimensions();
        });

        // Обработка колесика мыши (Зум относительно курсора)
        els.main.addEventListener('wheel', (e) => {
            if (!state.imgA || !state.imgB) return;
            e.preventDefault();

            const zoomSensitivity = 0.001;
            const delta = -e.deltaY * zoomSensitivity;
            let newScale = state.scale * Math.exp(delta);
            
            // Ограничения зума (от 5% до 1000%)
            newScale = Math.max(0.05, Math.min(newScale, 10));

            // Математика для зума в точку курсора
            const rect = els.main.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            // Корректируем смещение, чтобы точка под курсором осталась на месте
            state.translateX = mouseX - (mouseX - state.translateX) * (newScale / state.scale);
            state.translateY = mouseY - (mouseY - state.translateY) * (newScale / state.scale);
            
            state.scale = newScale;
            applyTransform();
        }, { passive: false });

        // Обработка перетаскивания холста
        els.main.addEventListener('pointerdown', (e) => {
            // Если клик не по слайдеру, начинаем панорамирование
            if (e.target.closest('.slider') || !state.imgA || !state.imgB) return;
            
            state.isPanning = true;
            state.startX = e.clientX;
            state.startY = e.clientY;
            state.initTranslateX = state.translateX;
            state.initTranslateY = state.translateY;
            els.body.classList.add('is-interacting');
            els.main.setPointerCapture(e.pointerId);
        });

        // =========================================
        // ЛОГИКА СЛАЙДЕРА (Сравнение)
        // =========================================

        els.slider.addEventListener('pointerdown', (e) => {
            if (!state.imgA || !state.imgB) return;
            state.isDraggingSlider = true;
            els.body.classList.add('is-interacting');
            els.slider.setPointerCapture(e.pointerId);
            e.stopPropagation(); // Предотвращаем панорамирование
        });

        window.addEventListener('pointermove', (e) => {
            if (state.isPanning) {
                const dx = e.clientX - state.startX;
                const dy = e.clientY - state.startY;
                state.translateX = state.initTranslateX + dx;
                state.translateY = state.initTranslateY + dy;
                applyTransform();
            } else if (state.isDraggingSlider) {
                // Вычисляем положение слайдера в процентах от контейнера
                const rect = els.container.getBoundingClientRect();
                let percent;

                if (state.splitMode === 'horizontal') {
                    percent = ((e.clientX - rect.left) / rect.width) * 100;
                } else {
                    percent = ((e.clientY - rect.top) / rect.height) * 100;
                }

                // Ограничиваем от 0 до 100
                state.splitPos = Math.max(0, Math.min(100, percent));
                updateSliderPosition();
            }
        });

        window.addEventListener('pointerup', (e) => {
            if (state.isPanning) {
                state.isPanning = false;
                els.main.releasePointerCapture(e.pointerId);
            }
            if (state.isDraggingSlider) {
                state.isDraggingSlider = false;
                els.slider.releasePointerCapture(e.pointerId);
            }
            els.body.classList.remove('is-interacting');
        });

        // Переключение режима разделения
        els.btnMode.addEventListener('click', () => {
            state.splitMode = state.splitMode === 'horizontal' ? 'vertical' : 'horizontal';
            
            // Обновляем UI
            els.slider.className = `slider ${state.splitMode}`;
            
            if (state.splitMode === 'horizontal') {
                els.iconModeH.classList.remove('hidden');
                els.iconModeV.classList.add('hidden');
                els.handleIcon.innerHTML = SVGS.horizontal;
                els.textMode.textContent = 'Vertical Split';
                els.slider.style.top = '0';
                els.slider.style.left = '';
            } else {
                els.iconModeH.classList.add('hidden');
                els.iconModeV.classList.remove('hidden');
                els.handleIcon.innerHTML = SVGS.vertical;
                els.textMode.textContent = 'Horizontal Split';
                els.slider.style.left = '0';
                els.slider.style.top = '';
            }
            
            updateSliderPosition();
        });

        function updateSliderPosition() {
            if (state.splitMode === 'horizontal') {
                // Двигаем слайдер
                els.slider.style.left = `${state.splitPos}%`;
                // Обрезаем верхнее изображение (B). inset(top right bottom left)
                // Если мы хотим показать B справа: обрезаем слева
                els.imgB.style.clipPath = `inset(0 0 0 ${state.splitPos}%)`;
            } else {
                // Двигаем слайдер
                els.slider.style.top = `${state.splitPos}%`;
                // Обрезаем верхнее изображение сверху
                els.imgB.style.clipPath = `inset(${state.splitPos}% 0 0 0)`;
            }
        }
        
        // Предотвращение стандартного поведения Drag-and-Drop браузера
        window.addEventListener('dragover', (e) => e.preventDefault());
        window.addEventListener('drop', (e) => e.preventDefault());
        els.imgA.addEventListener('dragstart', (e) => e.preventDefault());
        els.imgB.addEventListener('dragstart', (e) => e.preventDefault());

    </script>
</body>
</html>
